<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>REGISTERED STUDENTS</h1>
    <table border="2
    ">
        <tr>
            <th>Username</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Course</th>
            <th>Duration</th>
        </tr>
        {% for stu in students %}
        <tr>
            <td>{{ stu.user.username }}</td>
            <td>{{ stu.user.first_name }}</td>
            <td>{{ stu.user.last_name }}</td>
            <td>{{ stu.course }}</td>
            <td>{{ stu.duration }}</td>
        </tr>
        {% endfor %}
    </table>




    
</body>
</html>
